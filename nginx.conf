server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Cache hashed Astro assets forever (content-addressed filenames)
    location /_astro/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # No-cache on HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Clean URLs (Astro generates /about/index.html → reachable at /about)
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Custom 404 page (Astro static output generates /404.html)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
